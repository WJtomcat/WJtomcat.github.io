  <h1>安居房贷计算器支持</h1>
  <p>安居房贷计算器是一款用于估算商业贷款、公积金贷款和组合贷款月供、总利息、总还款与还款明细的本地计算工具。</p>
  <h2>常见问题</h2>
  <p>App 是否需要登录？不需要。当前版本打开后即可使用。</p>
  <p>贷款数据是否会上传？不会。当前版本所有计算均在设备本地完成。</p>
  <p>计算结果是否等同于银行最终结果？不是。计算结果仅用于估算和参考，实际还款金额以贷款合同和金融机构计算为准。</p>
  <h2>使用支持</h2>
  <p>如需反馈问题，请通过 App Store Connect 中填写的支持邮箱或支持网址联系开发者，并说明设备型号、系统版本和问题复现步骤。</p>
